<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Report</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

<h2 class="mb-4">Attendance Report</h2>

<form method="GET" action="/attendance_report" class="mb-3">

    <div class="row">

        <div class="col-md-3">
            <input type="date" name="date" class="form-control">
        </div>

        <div class="col-md-3">
            <button type="submit" class="btn btn-primary">Filter</button>
            <a href="/attendance_report" class="btn btn-secondary">Clear</a>
        </div>

    </div>

</form>
<form method="GET" action="/attendance_report" class="mb-3">

    <div class="row">

        <div class="col-md-4">
            <input type="text"
                   name="search"
                   class="form-control"
                   placeholder="Search by Name or Roll No">
        </div>

        <div class="col-md-3">
            <button type="submit" class="btn btn-success">
                Search
            </button>
        </div>

    </div>

</form>

<table class="table table-bordered table-hover shadow">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Student Name</th>
<th>Roll No</th>
<th>Date</th>
<th>Status</th>
</tr>

</thead>

<tbody>

{% for row in report %}

<tr>

<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>

<td>
{% if row[4] == "Present" %}
<span class="badge bg-success">Present</span>
{% else %}
<span class="badge bg-danger">Absent</span>
{% endif %}
</td>

</tr>

{% endfor %}

</tbody>

</table>
<a href="/export_excel" class="btn btn-success">
    Export Excel
</a>
<a href="/export_pdf" class="btn btn-danger">
    Export PDF
</a>

<a href="/dashboard" class="btn btn-secondary">Back</a>

</div>

</body>
</html>
