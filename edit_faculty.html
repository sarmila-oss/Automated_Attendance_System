<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Faculty</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
<div class="card shadow">
<div class="card-header bg-warning">
<h3>Edit Faculty</h3>
</div>
<div class="card-body">
<form action="/update_faculty" method="POST">
<input type="hidden" name="id" value="{{ faculty[0] }}">
<div class="mb-3">
<label>Name</label>
<input type="text" name="name" class="form-control" value="{{ faculty[1] }}" required>
</div>
<div class="mb-3">
<label>Department</label>
<input type="text" name="department" class="form-control" value="{{ faculty[2] }}" required>
</div>
<div class="mb-3">
<label>Email</label>
<input type="email" name="email" class="form-control" value="{{ faculty[3] }}">
</div>
<div class="mb-3">
<label>Phone</label>
<input type="text" name="phone" class="form-control" value="{{ faculty[4] }}">
</div>
<button class="btn btn-success">Update Faculty</button>
<a href="/faculty" class="btn btn-secondary">Back</a>
</form>
</div>
</div>
</div>
</body>
</html>
