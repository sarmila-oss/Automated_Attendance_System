<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Student</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
<div class="card shadow">
<div class="card-header bg-warning text-dark">
<h3>Edit Student</h3>
</div>
<div class="card-body">
<form action="/update_student" method="POST">
<input type="hidden" name="id" value="{{ student[0] }}">
<div class="mb-3">
<label>Name</label>
<input type="text" name="name" class="form-control" value="{{ student[1] }}" required>
</div>
<div class="mb-3">
<label>Roll No</label>
<input type="text" name="roll_no" class="form-control" value="{{ student[2] }}" required>
</div>
<div class="mb-3">
<label>Department</label>
<input type="text" name="department" class="form-control" value="{{ student[3] }}" required>
</div>
<div class="mb-3">
<label>Year</label>
<input type="number" name="year" class="form-control" value="{{ student[4] }}" required>
</div>
<div class="mb-3">
<label>Email</label>
<input type="email" name="email" class="form-control" value="{{ student[5] }}">
</div>
<div class="mb-3">
<label>Phone</label>
<input type="text" name="phone" class="form-control" value="{{ student[6] }}">
</div>
<button class="btn btn-success">Update Student</button>
<a href="/students" class="btn btn-secondary">Back</a>
</form>
</div>
</div>
</div>
</body>
</html>
