<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h2 class="mb-4">Faculty Management</h2>
    <a href="/add_faculty" class="btn btn-primary mb-3">Add Faculty</a>
    <table class="table table-bordered table-hover shadow">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Department</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        {% for row in faculty %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
            <td>{{ row[4] }}</td>
            <td>
                <a href="/edit_faculty/{{ row[0] }}" class="btn btn-warning btn-sm">
                    Edit
                </a>
                <a href="/delete_faculty/{{ row[0] }}"
                class="btn btn-danger btn-sm"
                onclick="return confirm('Delete this faculty?')">
                    Delete
                </a>
            </td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
    <a href="/dashboard" class="btn btn-secondary">
        Back
    </a>
</div>
</body>
</html>
