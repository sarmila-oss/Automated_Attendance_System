<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Students</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
<h2 class="mb-4">Student List</h2>
<a href="/add_student" class="btn btn-primary mb-3">Add New Student</a>
<table class="table table-bordered table-hover shadow">
<thead class="table-dark">
<tr>
<th>ID</th>
<th>Name</th>
<th>Roll No</th>
<th>Department</th>
<th>Year</th>
<th>Email</th>
<th>Phone</th>
<th>Action</th>
</tr>
</thead>
<tbody>
{% for student in students %}
<tr>
<td>{{ student[0] }}</td>
<td>{{ student[1] }}</td>
<td>{{ student[2] }}</td>
<td>{{ student[3] }}</td>
<td>{{ student[4] }}</td>
<td>{{ student[5] }}</td>
<td>{{ student[6] }}</td>
<td>
<a href="/edit_student/{{ student[0] }}" class="btn btn-warning btn-sm">Edit</a>
<a href="/delete_student/{{ student[0] }}"
   class="btn btn-danger btn-sm"
   onclick="return confirm('Are you sure you want to delete this student?')">
   Delete
</a>
</td>
</tr>
{% endfor %}
</tbody>
</table>
<a href="/dashboard" class="btn btn-secondary">Back</a>
</div>
</body>
</html>
